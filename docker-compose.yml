services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: knowledge_base
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge-local-password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/initdb:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge_base"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./secrets:/run/secrets:ro
    environment:
      DATABASE_URL: postgresql+psycopg://knowledge:knowledge-local-password@postgres:5432/knowledge_base
      DATABASE_URL_FILE: /run/secrets/database_url
      SECRET_KEY_FILE: /run/secrets/secret_key
      LLM_API_KEY_FILE: /run/secrets/llm_api_key
      RERANK_API_KEY_FILE: /run/secrets/rerank_api_key
    ports:
      - "8000:8000"
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    command: ["python", "-m", "app.worker"]
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/data:/app/data
      - ./secrets:/run/secrets:ro
    environment:
      DATABASE_URL: postgresql+psycopg://knowledge:knowledge-local-password@postgres:5432/knowledge_base
      DATABASE_URL_FILE: /run/secrets/database_url
      SECRET_KEY_FILE: /run/secrets/secret_key
      LLM_API_KEY_FILE: /run/secrets/llm_api_key
      RERANK_API_KEY_FILE: /run/secrets/rerank_api_key
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "from sqlalchemy import text; from app.core.database import engine; connection = engine.connect(); connection.execute(text('SELECT 1')); connection.close()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backup:
    image: postgres:16
    environment:
      PGHOST: postgres
      PGDATABASE: knowledge_base
      PGUSER: knowledge
      PGPASSWORD: knowledge-local-password
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
    volumes:
      - ./backups:/backups
    command:
      - /bin/sh
      - -c
      - |
        while true; do
          timestamp=$$(date -u +%Y%m%dT%H%M%SZ)
          pg_dump --clean --if-exists | gzip > "/backups/knowledge_base_$${timestamp}.sql.gz"
          find /backups -type f -name 'knowledge_base_*.sql.gz' -mtime +$${BACKUP_RETENTION_DAYS} -delete
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
